name: Keepalive

on:
  schedule:
    - cron: "0 12 * * 1"  # Every Monday noon UTC
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # TODO: pin gautamkrishnar/keepalive-workflow to a commit SHA
      # Find the SHA at: github.com/gautamkrishnar/keepalive-workflow/commits/master
      - uses: gautamkrishnar/keepalive-workflow@v2
        with:
          time_elapsed: 50
